<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Timer</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #08080d;
  --surface: #101018;
  --surface2: #181824;
  --border: #252535;
  --border-light: #35354a;
  --text: #e4e4f0;
  --text-dim: #6e6e85;
  --text-faint: #44445a;
  --accent: #ff6b35;
  --accent-glow: rgba(255, 107, 53, 0.12);
  --accent-glow2: rgba(255, 107, 53, 0.06);
  --green: #34d399;
  --red: #f87171;
  --red-dim: rgba(248, 113, 113, 0.1);
  --radius: 14px;
  --radius-sm: 10px;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle at 50% 0%, rgba(255,107,53,0.04) 0%, transparent 60%),
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 100% 100%, 48px 48px, 48px 48px;
  pointer-events: none; z-index: 0;
}
.app {
  position: relative; z-index: 1;
  max-width: 580px; margin: 0 auto;
  padding: 16px 16px 100px;
}
.hidden { display: none !important; }

.btn {
  font-family: 'Outfit', sans-serif;
  font-size: 0.88rem; font-weight: 600;
  padding: 12px 28px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer; transition: all 0.2s;
  background: var(--surface2); color: var(--text);
  display: inline-flex; align-items: center;
  justify-content: center; gap: 6px;
}
.btn:hover { border-color: var(--border-light); transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-start {
  background: var(--accent); border-color: var(--accent);
  color: #fff; padding: 14px 36px; font-size: 0.95rem;
}
.btn-start:hover { box-shadow: 0 4px 30px var(--accent-glow); border-color: var(--accent); }
.btn-stop {
  background: var(--red-dim); border-color: var(--red);
  color: var(--red); padding: 14px 28px; font-size: 0.95rem;
}
.btn-stop:hover { background: rgba(248,113,113,0.18); box-shadow: 0 4px 20px rgba(248,113,113,0.12); border-color: var(--red); }
.btn-discard { background: var(--surface2); border-color: var(--border); color: var(--text-dim); }
.btn-sm { padding: 8px 16px; font-size: 0.78rem; }
.btn-danger { color: var(--red); border-color: rgba(248,113,113,0.3); }
.btn-danger:hover { background: var(--red-dim); border-color: var(--red); }

.sync-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 20px;
  font-size: 0.72rem; color: var(--text-dim);
  margin-bottom: 20px; width: fit-content;
}
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-faint); flex-shrink: 0; }
.sync-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
.sync-dot.syncing { background: var(--accent); animation: pulse 1s infinite; }
.sync-dot.error { background: var(--red); }
.sync-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1rem; padding: 0 2px; transition: all 0.2s; line-height: 1; }
.sync-btn:hover { color: var(--text); }
.sync-btn.spinning { animation: spin 0.8s linear infinite; }

.header { text-align: center; margin-bottom: 28px; animation: fadeDown 0.5s ease; }
.header h1 { font-family: 'JetBrains Mono', monospace; font-size: 0.95rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); }
.today-date { font-size: 0.78rem; color: var(--text-dim); margin-top: 4px; }

.timer-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 44px 24px 36px;
  text-align: center; position: relative; overflow: hidden;
  animation: fadeUp 0.5s ease;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.timer-card.running { border-color: var(--accent); box-shadow: 0 0 50px var(--accent-glow2), inset 0 0 50px var(--accent-glow2); }
.timer-card.running::before {
  content: ''; position: absolute; top: 0; left: -100%;
  width: 200%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  animation: shimmer 2.5s infinite;
}
.pulse-ring { display: none; width: 10px; height: 10px; background: var(--accent); border-radius: 50%; margin: 0 auto 18px; animation: pulse 1.5s infinite; }
.timer-card.running .pulse-ring { display: block; }
.timer-display { font-family: 'JetBrains Mono', monospace; font-size: 4rem; font-weight: 700; letter-spacing: 0.04em; line-height: 1; margin-bottom: 6px; transition: color 0.3s; }
.timer-card.running .timer-display { color: var(--accent); }
.timer-label { font-size: 0.78rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 28px; transition: color 0.3s; }
.timer-card.running .timer-label { color: var(--accent); opacity: 0.6; }
.controls { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

.section-label { font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-faint); margin: 28px 0 12px; padding-left: 4px; }

.stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; animation: fadeUp 0.5s ease 0.1s both; }
.stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 14px; text-align: center; }
.stat-val { font-family: 'JetBrains Mono', monospace; font-size: 1.3rem; font-weight: 700; margin-bottom: 2px; }
.stat-key { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }
.stat-box.accent .stat-val { color: var(--accent); }

.sessions-list { display: flex; flex-direction: column; gap: 6px; animation: fadeUp 0.5s ease 0.15s both; }
.session-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; transition: border-color 0.2s; }
.session-item:hover { border-color: var(--border-light); }
.session-num { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--text-faint); margin-bottom: 1px; }
.session-range { font-size: 0.78rem; color: var(--text-dim); }
.session-right { display: flex; align-items: center; gap: 10px; }
.session-dur { font-family: 'JetBrains Mono', monospace; font-size: 0.88rem; font-weight: 600; color: var(--green); }
.del-btn { background: none; border: none; color: var(--text-faint); cursor: pointer; font-size: 0.78rem; padding: 4px 6px; border-radius: 6px; opacity: 0; transition: all 0.2s; }
.session-item:hover .del-btn { opacity: 1; }
.del-btn:hover { color: var(--red); background: var(--red-dim); }
.empty-state { text-align: center; padding: 32px 20px; color: var(--text-dim); font-size: 0.82rem; }
.empty-icon { font-size: 1.8rem; margin-bottom: 6px; opacity: 0.5; }

.toggle-btn { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 16px; color: var(--text-dim); font-family: 'Outfit', sans-serif; font-size: 0.82rem; font-weight: 500; cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-top: 10px; transition: all 0.2s; }
.toggle-btn:hover { border-color: var(--border-light); color: var(--text); }
.chevron { font-size: 0.7rem; transition: transform 0.2s; }
.toggle-btn.open .chevron { transform: rotate(180deg); }

.history-section { margin-top: 8px; animation: fadeUp 0.3s ease; }
.history-day { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
.history-date { font-size: 0.85rem; }
.history-meta { font-size: 0.7rem; color: var(--text-dim); margin-top: 1px; }
.history-total { font-family: 'JetBrains Mono', monospace; font-size: 0.88rem; font-weight: 600; color: var(--accent); }

.settings-section { margin-top: 8px; animation: fadeUp 0.3s ease; }
.setting-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
.setting-row strong { font-size: 0.85rem; }
.setting-desc { font-size: 0.72rem; color: var(--text-dim); margin-top: 1px; }
.setting-row.danger { border-color: rgba(248,113,113,0.15); }

.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 22px; border-radius: var(--radius-sm); font-size: 0.82rem; opacity: 0; transition: all 0.3s ease; z-index: 300; pointer-events: none; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes shimmer { 0% { transform: translateX(-50%); } 100% { transform: translateX(50%); } }
@keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.4; transform:scale(1.4); } }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

@media (max-width: 480px) {
  .timer-display { font-size: 3rem; }
  .timer-card { padding: 32px 16px 28px; }
  .stats-row { gap: 6px; }
  .stat-box { padding: 12px 8px; }
  .stat-val { font-size: 1.1rem; }
}
</style>
</head>
<body>

  <div class="app" id="mainApp">
    <div class="sync-bar">
      <span class="sync-dot" id="syncDot"></span>
      <span id="syncText">Connecting...</span>
      <button class="sync-btn" id="syncBtn" onclick="App.manualSync()" title="Sync now">⟳</button>
    </div>

    <header class="header">
      <h1>⏱ Study Timer</h1>
      <div class="today-date" id="todayDate"></div>
    </header>

    <section class="timer-card" id="timerCard">
      <div class="pulse-ring"></div>
      <div class="timer-display" id="timerDisplay">00:00:00</div>
      <div class="timer-label" id="timerLabel">Ready to focus</div>
      <div class="controls">
        <button class="btn btn-start" id="startBtn" onclick="Timer.start()">Start Session</button>
        <button class="btn btn-stop hidden" id="stopBtn" onclick="Timer.stop()">Stop &amp; Save</button>
        <button class="btn btn-discard hidden" id="discardBtn" onclick="Timer.discard()">Discard</button>
      </div>
    </section>

    <div class="section-label">Today</div>
    <section class="stats-row">
      <div class="stat-box accent">
        <div class="stat-val" id="totalTime">0h 0m</div>
        <div class="stat-key">Total Time</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="sessionCount">0</div>
        <div class="stat-key">Sessions</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="avgSession">—</div>
        <div class="stat-key">Avg Session</div>
      </div>
    </section>

    <div class="section-label">Sessions</div>
    <section id="sessionsList" class="sessions-list">
      <div class="empty-state"><div class="empty-icon">📚</div><p>No sessions yet today</p></div>
    </section>

    <button class="toggle-btn" id="historyToggle" onclick="UI.toggleHistory()">Past Days <span class="chevron">▾</span></button>
    <section class="history-section hidden" id="historySection"><div id="historyList"></div></section>

    <button class="toggle-btn" id="settingsToggle" onclick="UI.toggleSettings()">Settings <span class="chevron">▾</span></button>
    <section class="settings-section hidden" id="settingsSection">
      <div class="setting-row">
        <div><strong>GitHub Gist Sync</strong><p class="setting-desc" id="gistStatus">Checking...</p></div>
        <button class="btn btn-sm" onclick="App.manualSync()">Sync</button>
      </div>
      <div class="setting-row">
        <div><strong>Export Data</strong><p class="setting-desc">Download JSON backup</p></div>
        <button class="btn btn-sm" onclick="Data.exportJSON()">Export</button>
      </div>
      <div class="setting-row">
        <div><strong>Import Data</strong><p class="setting-desc">Load from JSON file</p></div>
        <button class="btn btn-sm" onclick="Data.triggerImport()">Import</button>
      </div>
      <div class="setting-row danger">
        <div><strong>Clear All Data</strong><p class="setting-desc">Permanently delete everything</p></div>
        <button class="btn btn-sm btn-danger" onclick="Data.clearAll()">Clear</button>
      </div>
    </section>
    <input type="file" id="fileInput" accept=".json" style="display:none" onchange="Data.handleImport(event)">
  </div>

  <div class="toast" id="toast"></div>

<script>
/* ========== DATA / STORAGE ========== */
var Data = (function() {
  var SK = 'study_timer_data';
  var GK = 'study_timer_gist_id';
  var GF = 'study_timer_data.json';
  var TK = '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';

  function gl() { try { return JSON.parse(localStorage.getItem(SK)) || {}; } catch(e) { return {}; } }
  function sl(d) { localStorage.setItem(SK, JSON.stringify(d)); }
  function gid() { return localStorage.getItem(GK) || ''; }
  function sid(id) { localStorage.setItem(GK, id); }
  function cloud() { return !!(TK && gid()); }

  function tk() {
    var d = new Date();
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  function todaySessions() { return gl()[tk()] || []; }

  function addSession(s) {
    var data = gl(), k = tk();
    if (!data[k]) data[k] = [];
    data[k].push(s); sl(data);
  }

  function delSession(i) {
    var data = gl(), k = tk();
    if (data[k]) { data[k].splice(i,1); if (!data[k].length) delete data[k]; sl(data); }
  }

  function merge(a, b) {
    var m = JSON.parse(JSON.stringify(a));
    var ks = Object.keys(b);
    for (var i=0; i<ks.length; i++) {
      var k = ks[i];
      if (!m[k]) { m[k] = b[k]; }
      else {
        var ends = {};
        for (var j=0; j<m[k].length; j++) ends[m[k][j].endedAt] = 1;
        for (var x=0; x<b[k].length; x++) if (!ends[b[k][x].endedAt]) m[k].push(b[k][x]);
      }
    }
    return m;
  }

  function hdr() { return {'Authorization':'Bearer '+TK,'Content-Type':'application/json','Accept':'application/vnd.github+json'}; }

  function findGist() {
    return fetch('https://api.github.com/gists',{headers:hdr()})
      .then(function(r){if(!r.ok) throw new Error('Bad');return r.json();})
      .then(function(gs){for(var i=0;i<gs.length;i++) if(gs[i].files&&gs[i].files[GF]) return gs[i].id; return null;});
  }

  function makeGist() {
    var f={}; f[GF]={content:JSON.stringify(gl(),null,2)||'{}'};
    return fetch('https://api.github.com/gists',{method:'POST',headers:hdr(),body:JSON.stringify({description:'Study Timer',public:false,files:f})})
      .then(function(r){if(!r.ok) throw new Error('Fail');return r.json();}).then(function(g){return g.id;});
  }

  function getGist() {
    var id=gid(); if(!id) return Promise.resolve(null);
    return fetch('https://api.github.com/gists/'+id,{headers:hdr()})
      .then(function(r){if(!r.ok) throw new Error('Fail');return r.json();})
      .then(function(g){var c=g.files&&g.files[GF]&&g.files[GF].content; return c?JSON.parse(c):{};});
  }

  function putGist(data) {
    var id=gid(); if(!id) return Promise.resolve();
    var f={}; f[GF]={content:JSON.stringify(data,null,2)};
    return fetch('https://api.github.com/gists/'+id,{method:'PATCH',headers:hdr(),body:JSON.stringify({files:f})})
      .then(function(r){if(!r.ok) throw new Error('Fail');});
  }

  function sync() {
    if(!cloud()) return Promise.resolve(false);
    return getGist().then(function(remote){
      var merged=merge(gl(),remote||{}); sl(merged);
      return putGist(merged);
    }).then(function(){return true;});
  }

  function push() {
    if(!cloud()) return Promise.resolve();
    return putGist(gl()).catch(function(e){console.error(e);});
  }

  function autoConnect() {
    return findGist().then(function(id){
      if(id){sid(id);return sync();}
      else{return makeGist().then(function(nid){sid(nid);return true;});}
    });
  }

  function exportJSON() {
    var b=new Blob([JSON.stringify(gl(),null,2)],{type:'application/json'});
    var a=document.createElement('a'); a.href=URL.createObjectURL(b);
    a.download='study-timer-'+tk()+'.json'; a.click(); UI.toast('Exported ✓');
  }
  function triggerImport() { document.getElementById('fileInput').click(); }
  function handleImport(e) {
    var f=e.target.files[0]; if(!f) return;
    var r=new FileReader();
    r.onload=function(ev){
      try{var m=merge(gl(),JSON.parse(ev.target.result));sl(m);UI.renderAll();UI.toast('Imported ✓');push();}
      catch(err){UI.toast('Invalid file');}
    }; r.readAsText(f); e.target.value='';
  }
  function clearAll() {
    if(!confirm('Delete ALL data?')) return;
    if(!confirm('Really sure?')) return;
    localStorage.removeItem(SK); UI.renderAll(); UI.toast('Cleared'); push();
  }

  return {
    getLocal:gl, todayKey:tk, getTodaySessions:todaySessions,
    addSession:addSession, deleteSession:delSession,
    getGistId:gid, isCloudEnabled:cloud,
    autoConnect:autoConnect, syncWithCloud:sync, pushToCloud:push,
    exportJSON:exportJSON, triggerImport:triggerImport,
    handleImport:handleImport, clearAll:clearAll
  };
})();

/* ========== TIMER ========== */
var Timer = (function() {
  var iv=null, st=null, el=0, on=false;

  function start() {
    on=true; st=Date.now()-(el*1000);
    iv=setInterval(tick,200);
    document.getElementById('timerCard').classList.add('running');
    document.getElementById('startBtn').classList.add('hidden');
    document.getElementById('stopBtn').classList.remove('hidden');
    document.getElementById('discardBtn').classList.remove('hidden');
    document.getElementById('timerLabel').textContent='Studying...';
    document.title='⏱ Studying...';
  }

  function stop() {
    if(!on) return; clearInterval(iv); on=false;
    if(el>=1){
      var now=new Date(), began=new Date(now.getTime()-el*1000);
      Data.addSession({duration:el,startedAt:began.toISOString(),endedAt:now.toISOString()});
      UI.toast('Session saved ✓');
      Data.pushToCloud().then(function(){App.updateSyncUI('synced');}).catch(function(){App.updateSyncUI('error');});
    }
    rst(); UI.renderAll();
  }

  function discard() {
    if(on&&el>5&&!confirm('Discard?')) return;
    clearInterval(iv); on=false; rst();
  }

  function rst() {
    el=0;
    document.getElementById('timerCard').classList.remove('running');
    document.getElementById('timerDisplay').textContent='00:00:00';
    document.getElementById('startBtn').classList.remove('hidden');
    document.getElementById('stopBtn').classList.add('hidden');
    document.getElementById('discardBtn').classList.add('hidden');
    document.getElementById('timerLabel').textContent='Ready to focus';
    document.title='Study Timer';
  }

  function tick() {
    el=Math.floor((Date.now()-st)/1000);
    var h=Math.floor(el/3600),m=Math.floor((el%3600)/60),s=el%60;
    var d=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    document.getElementById('timerDisplay').textContent=d;
    document.title='⏱ '+d+' | Studying';
  }

  function isRunning(){return on;}
  return {start:start,stop:stop,discard:discard,isRunning:isRunning};
})();

/* ========== UI ========== */
var UI = (function() {
  function fd(secs){
    var h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60;
    if(h>0) return h+'h '+m+'m'; if(m>0) return m+'m '+s+'s'; return s+'s';
  }
  function ft(iso){return new Date(iso).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
  function fdn(k){var p=k.split('-');return new Date(p[0],p[1]-1,p[2]).toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});}

  function renderStats(){
    var ss=Data.getTodaySessions(),t=0;
    for(var i=0;i<ss.length;i++) t+=ss[i].duration;
    document.getElementById('totalTime').textContent=Math.floor(t/3600)+'h '+Math.floor((t%3600)/60)+'m';
    document.getElementById('sessionCount').textContent=ss.length;
    document.getElementById('avgSession').textContent=ss.length?fd(Math.round(t/ss.length)):'—';
  }

  function renderSessions(){
    var ss=Data.getTodaySessions(),list=document.getElementById('sessionsList');
    if(!ss.length){list.innerHTML='<div class="empty-state"><div class="empty-icon">📚</div><p>No sessions yet today</p></div>';return;}
    var h='';
    for(var i=ss.length-1;i>=0;i--){
      var s=ss[i];
      h+='<div class="session-item"><div><div class="session-num">#'+(i+1)+'</div>'+
        '<div class="session-range">'+ft(s.startedAt)+' → '+ft(s.endedAt)+'</div></div>'+
        '<div class="session-right"><span class="session-dur">'+fd(s.duration)+'</span>'+
        '<button class="del-btn" onclick="UI.deleteSession('+i+')" title="Delete">✕</button></div></div>';
    }
    list.innerHTML=h;
  }

  function deleteSession(i){
    if(!confirm('Delete session?')) return;
    Data.deleteSession(i);renderAll();toast('Deleted');Data.pushToCloud();
  }

  function renderHistory(){
    var data=Data.getLocal(),today=Data.todayKey();
    var days=Object.keys(data).filter(function(k){return k!==today;}).sort().reverse();
    var c=document.getElementById('historyList');
    if(!days.length){c.innerHTML='<div class="empty-state"><p>No past days yet</p></div>';return;}
    var h='';
    for(var i=0;i<days.length;i++){
      var ss=data[days[i]],t=0;
      for(var j=0;j<ss.length;j++) t+=ss[j].duration;
      h+='<div class="history-day"><div><div class="history-date">'+fdn(days[i])+'</div>'+
        '<div class="history-meta">'+ss.length+' session'+(ss.length!==1?'s':'')+'</div></div>'+
        '<div class="history-total">'+fd(t)+'</div></div>';
    }
    c.innerHTML=h;
  }

  function renderAll(){renderStats();renderSessions();renderHistory();}

  function toggleHistory(){
    document.getElementById('historySection').classList.toggle('hidden');
    document.getElementById('historyToggle').classList.toggle('open');
  }
  function toggleSettings(){
    document.getElementById('settingsSection').classList.toggle('hidden');
    document.getElementById('settingsToggle').classList.toggle('open');
  }
  function toast(msg){
    var el=document.getElementById('toast');
    el.textContent=msg;el.classList.add('show');
    setTimeout(function(){el.classList.remove('show');},2500);
  }

  return {renderAll:renderAll,deleteSession:deleteSession,toggleHistory:toggleHistory,toggleSettings:toggleSettings,toast:toast};
})();

/* ========== APP ========== */
var App = (function() {
  function init(){
    document.getElementById('todayDate').textContent=new Date().toLocaleDateString([],{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    UI.renderAll();

    if(Data.isCloudEnabled()){
      updateSyncUI('syncing');
      Data.syncWithCloud()
        .then(function(){UI.renderAll();updateSyncUI('synced');})
        .catch(function(){UI.renderAll();updateSyncUI('error');});
    } else {
      updateSyncUI('syncing');
      Data.autoConnect()
        .then(function(){UI.renderAll();updateSyncUI('synced');gistStatus();})
        .catch(function(e){console.error(e);UI.renderAll();updateSyncUI('error');});
    }
    gistStatus();

    window.addEventListener('beforeunload',function(e){if(Timer.isRunning()){e.preventDefault();e.returnValue='';}});
    setInterval(function(){
      if(Data.isCloudEnabled()&&!Timer.isRunning())
        Data.syncWithCloud().then(function(){updateSyncUI('synced');}).catch(function(){updateSyncUI('error');});
    },5*60*1000);
  }

  function updateSyncUI(state){
    var dot=document.getElementById('syncDot'),txt=document.getElementById('syncText'),btn=document.getElementById('syncBtn');
    dot.className='sync-dot'; btn.classList.remove('spinning');
    if(state==='synced'){dot.classList.add('connected');txt.textContent='Synced with GitHub';}
    else if(state==='syncing'){dot.classList.add('syncing');txt.textContent='Syncing...';btn.classList.add('spinning');}
    else if(state==='error'){dot.classList.add('error');txt.textContent='Sync error';}
    else{txt.textContent='Local only';}
  }

  function gistStatus(){
    var el=document.getElementById('gistStatus');
    el.textContent=Data.getGistId()?'Connected — Gist: '+Data.getGistId().slice(0,8)+'...':'Connecting...';
  }

  function manualSync(){
    updateSyncUI('syncing');
    (Data.isCloudEnabled()?Data.syncWithCloud():Data.autoConnect())
      .then(function(){UI.renderAll();updateSyncUI('synced');gistStatus();UI.toast('Synced ✓');})
      .catch(function(){updateSyncUI('error');UI.toast('Sync failed');});
  }

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
  else init();

  return {manualSync:manualSync,updateSyncUI:updateSyncUI};
})();
</script>
